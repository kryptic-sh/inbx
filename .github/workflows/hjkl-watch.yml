name: hjkl release watcher

# Daily check of kryptic-sh/hjkl. When a new tag is published, opens (or
# updates) a PR that bumps `.github/hjkl-version.txt` plus the workspace
# `Cargo.toml` hjkl deps, so a human reviews the upgrade before it lands.

on:
  schedule:
    # Hourly on the hour. Worst-case latency from a hjkl release to PR
    # landing here is ~1h + queue time.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest hjkl release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub API call (no auth boundary because hjkl repo is public,
          # but ride GITHUB_TOKEN to keep the rate limit healthy).
          LATEST=$(gh release view --repo kryptic-sh/hjkl --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            echo "no releases found on kryptic-sh/hjkl"
            exit 0
          fi
          # Strip leading v if present.
          LATEST="${LATEST#v}"
          CURRENT=$(cat .github/hjkl-version.txt | tr -d '[:space:]')
          echo "latest=$LATEST"     >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT"   >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch release notes
        if: steps.latest.outputs.match == 'false'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view "v${{ steps.latest.outputs.latest }}" \
                   --repo kryptic-sh/hjkl --json body --jq '.body' || true)
          if [ -z "$BODY" ]; then
            BODY="(no release notes published)"
          fi
          {
            echo "body<<__EOF__"
            echo "$BODY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Bump hjkl pin
        if: steps.latest.outputs.match == 'false'
        run: |
          set -euo pipefail
          NEW="${{ steps.latest.outputs.latest }}"
          echo "$NEW" > .github/hjkl-version.txt
          # Pin the workspace deps. We currently consume hjkl as path deps;
          # surface the pinned version in a sibling comment so reviewers
          # know which release the PR was generated against.
          python3 - <<PY
          from pathlib import Path
          p = Path("Cargo.toml")
          src = p.read_text()
          marker = "# hjkl path deps."
          if marker in src:
              # Update the comment line that records the pinned version.
              lines = []
              for line in src.splitlines():
                  if line.startswith("# hjkl path deps."):
                      lines.append(f"# hjkl path deps. Pinned to {('$NEW')} (.github/hjkl-version.txt).")
                  else:
                      lines.append(line)
              p.write_text("\n".join(lines) + "\n")
          PY
          git diff --stat

      - name: Open or refresh PR
        if: steps.latest.outputs.match == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/hjkl-${{ steps.latest.outputs.latest }}"
          git config user.name "inbx-bot"
          git config user.email "bot@kryptic.sh"
          git switch -C "$BRANCH"
          git add .github/hjkl-version.txt Cargo.toml
          git commit -m "chore(hjkl): bump pin to ${{ steps.latest.outputs.latest }}" || {
            echo "no changes to commit"
            exit 0
          }
          git push -f origin "$BRANCH"
          BODY=$(cat <<'EOFNOTES'
          New hjkl release detected. Worth a manual review since the
          composer wires `runtime::*` today and a 0.1.0 bump may flip
          the API toward `spec::*` traits.

          - **From:** ${{ steps.latest.outputs.current }}
          - **To:**   ${{ steps.latest.outputs.latest }}
          - **Source:** https://github.com/kryptic-sh/hjkl/releases/tag/v${{ steps.latest.outputs.latest }}

          ## Release notes

          ${{ steps.notes.outputs.body }}

          ## Reviewer checklist

          - [ ] `cargo build --workspace` clean
          - [ ] `cargo test --workspace` clean
          - [ ] If 0.1.0+: migrate `inbx-composer` from `runtime::Editor`
                to `spec::*` traits per `PLAN.md`.
          - [ ] If breaking: update CHANGELOG / release-plz.toml.
          EOFNOTES
          )
          if gh pr view "$BRANCH" --json number --jq '.number' >/dev/null 2>&1; then
            gh pr edit "$BRANCH" \
              --title "chore(hjkl): bump to ${{ steps.latest.outputs.latest }}" \
              --body "$BODY"
          else
            gh pr create \
              --base main --head "$BRANCH" \
              --title "chore(hjkl): bump to ${{ steps.latest.outputs.latest }}" \
              --body "$BODY"
          fi
