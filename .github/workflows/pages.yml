name: pages

# GitHub Pages deploy for the inbx marketing site at
# https://inbx.kryptic.sh/. Source lives in `web/`. The version badge
# uses `__VERSION__` placeholder substituted from the latest umbrella
# `inbx-v*` git tag at deploy time.
#
# Tag scheme note: inbx is multi-package, so each crate uses its own
# prefix (`inbx-sync-v…`, `inbx-store-v…`, etc.). The umbrella version
# this site advertises is the `inbx-v*` (no further suffix) line.
#
# Triggers:
#   - tag push (inbx-v*)   → marketing version rebakes from latest tag
#   - main + web/**        → marketing copy edits redeploy with current tag
#   - workflow_dispatch    → manual rebuild

on:
  push:
    tags:
      - 'inbx-v*'
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'web/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build site
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need full history for `git describe`

      - name: Resolve latest umbrella inbx tag
        id: ver
        run: |
          set -euo pipefail
          # inbx-v matches the umbrella, but `--match 'inbx-v*'` would
          # also greedily catch `inbx-sync-v…` / `inbx-core-v…` since
          # those also begin with `inbx-`. Filter to exactly
          # `inbx-vN.N.N` (no extra hyphen between `inbx` and `v`).
          tag=$(
            git tag --list 'inbx-v*' --sort=-v:refname \
              | grep -E '^inbx-v[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n1 \
              || true
          )
          tag="${tag:-inbx-v0.0.0}"
          ver="${tag#inbx-v}"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Latest umbrella tag: $tag (version=$ver)"

      - name: Substitute version into marketing HTML
        run: |
          set -euo pipefail
          sed -i "s/__VERSION__/${{ steps.ver.outputs.version }}/g" web/index.html
          if grep -q "__VERSION__" web/index.html; then
            echo "::error::Stale __VERSION__ markers remain in web/index.html"
            exit 1
          fi

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf site
          cp -a web site
          echo "inbx.kryptic.sh" > site/CNAME
          touch site/.nojekyll
          ls -la site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if:
      github.ref == 'refs/heads/main' || startsWith(github.ref,
      'refs/tags/inbx-v')
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
