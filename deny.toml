[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
  # Marvin Attack timing sidechannel in `rsa` (pulled by `pgp`/rpgp).
  # No safe upgrade exists. Mitigation requires sequoia-openpgp, which
  # adds a C dep (nettle/openssl) — explicitly avoided per M22 design.
  # Threat model: attacker must observe local decryption timing; not
  # exploitable over a network for an end-user email client.
  "RUSTSEC-2023-0071",
  # `paste` is unmaintained but has no known vulnerabilities. Transitive.
  "RUSTSEC-2024-0436",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "BSL-1.0",              # clipboard-win, error-code (Boost SL — permissive, OSI+FSF)
  "OFL-1.1",              # epaint_default_fonts (SIL Open Font License — permissive)
  "Ubuntu-font-1.0",      # epaint_default_fonts (Ubuntu Font Licence — permissive)
  "bzip2-1.0.6",          # libbz2-rs-sys (bzip2 license — permissive)
  "CDLA-Permissive-2.0",  # webpki-roots etc. (Linux Foundation permissive)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true   # workspace-internal path deps have no version field; treat as ok
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
